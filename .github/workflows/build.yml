name: CI
on: [push]
jobs:
  build:
    name: Builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22.18.0
      - run: yarn install
      - run: yarn build
      # Smoke-test that dist/esm/**/*.js is actually importable under Node's
      # strict ESM resolver. Catches missing .js extensions, named imports
      # from CJS-only deps, and `require.main` slipping into ESM output —
      # the failure modes that the build emits silently and only show up
      # downstream (Vite SSR, Next.js SSR, vm modules).
      - run: yarn test:esm-smoke
