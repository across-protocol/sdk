name: PR checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-checks:
    name: PR checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.18.0

      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn lint-check

      - name: Build
        run: yarn build

      - name: ESM smoke test
        run: yarn test:esm-smoke
